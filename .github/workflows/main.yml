name: Stock Tracker
on: 
  schedule:
    - cron: '0 12 * * *'
      timezone: 'America/New_York'
    - cron: '30 16 * * *'
      timezone: 'America/New_York'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 yfinance fredapi pandas numpy python-dotenv
      - run: python tracker.py
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PERSONAL_EMAIL_ADDRESS: ${{ secrets.PERSONAL_EMAIL_ADDRESS }}
          PERSONAL_EMAIL_APP_PASSWORD: ${{ secrets.PERSONAL_EMAIL_APP_PASSWORD }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TARGET_EMAIL_ADDRESS: ${{ secrets.TARGET_EMAIL_ADDRESS }}
